<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- transparent center -->
  <rect width="160" height="160" fill="none"/>

  <!-- TOP-LEFT corner (L-shape pixel) -->
  <rect x="0"   y="0"  width="24" height="6"  fill="#CC2222"/>
  <rect x="0"   y="0"  width="6"  height="24" fill="#CC2222"/>

  <!-- TOP-RIGHT corner -->
  <rect x="136" y="0"  width="24" height="6"  fill="#CC2222"/>
  <rect x="154" y="0"  width="6"  height="24" fill="#CC2222"/>

  <!-- BOTTOM-LEFT corner -->
  <rect x="0"   y="154" width="24" height="6"  fill="#CC2222"/>
  <rect x="0"   y="136" width="6"  height="24" fill="#CC2222"/>

  <!-- BOTTOM-RIGHT corner -->
  <rect x="136" y="154" width="24" height="6"  fill="#CC2222"/>
  <rect x="154" y="136" width="6"  height="24" fill="#CC2222"/>

  <!-- inner corner dots (pixel feel) -->
  <rect x="6"   y="6"   width="6" height="6" fill="#FF3333"/>
  <rect x="148" y="6"   width="6" height="6" fill="#FF3333"/>
  <rect x="6"   y="148" width="6" height="6" fill="#FF3333"/>
  <rect x="148" y="148" width="6" height="6" fill="#FF3333"/>
</svg>
